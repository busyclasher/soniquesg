    <meta charset="UTF-8" />

    <title>Sonique Studio SG - Music Lessons in Singapore</title>
    <meta name="description" content="Sonique Studio SG offers personalised home-based music lessons in Acoustic Guitar, Electric Guitar, Piano & Keyboard, and Violin across Singapore. Qualified teachers, flexible scheduling, and free trial lessons available." />
    <meta name="keywords" content="music lessons Singapore, guitar lessons Singapore, piano lessons Singapore, violin lessons Singapore, home-based music studio" />

    <!-- Open Graph / Facebook -->

    <!-- Twitter Card -->

    <meta name="twitter:title" content="Sonique Studio SG — Music Lessons in Singapore" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Importing fonts to match the aesthetic: Anton (similar to Gagalin/Headers) and Montserrat (Clean body text similar to Proxima Nova) -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              sonique: {
                dark: '#231D1F',
                gold: '#c3a665',
                light: '#f5f5f5',
              }
            },
            fontFamily: {
              header: ['Anton', 'sans-serif'],
              body: ['Montserrat', 'sans-serif'],
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            },
            animation: {
              'fade-in-up': 'fadeInUp 1s ease-out forwards',
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Montserrat', sans-serif;
        background-color: #f8f9fa;
        color: #231D1F;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Anton', sans-serif;
        letter-spacing: 0.05em;
      }
      /* Section entrance animation */
      .reveal {
        opacity: 0;
        transform: translateY(28px);
        transition: opacity 0.75s ease-out, transform 0.75s ease-out;
      }
      .reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }
      /* Carousel progress bar fill */
      @keyframes progress-fill {
        from { width: 0%; }
        to   { width: 100%; }
      }
      .progress-bar-fill {
        animation: progress-fill 6s linear forwards;
      }
    </style>
